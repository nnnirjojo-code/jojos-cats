<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jojo's cats</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --cream:#FDF6EE; --dark:#2C2218; --orange:#E8954A;
  --gold:#C17F3B; --warm:#A08870; --light:#FFFDF9;
  --border:#D4B896; --text:#4A3728;
}
body{background:var(--cream);color:var(--dark);font-family:'Lato',sans-serif;font-weight:300;}

/* NAV */
nav{background:var(--dark);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;border-bottom:1px solid rgba(255,255,255,0.06);}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;font-style:italic;color:var(--orange);cursor:pointer;}
.nav-links{display:flex;gap:6px;align-items:center;}
.nav-links button{background:none;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);padding:6px 14px;transition:color 0.2s;}
.nav-links button:hover,.nav-links button.active{color:var(--cream);}
.nav-links button.active{border-bottom:1px solid var(--orange);}
.lang-toggle{background:none;border:0.5px solid rgba(255,255,255,0.2)!important;color:var(--warm)!important;padding:4px 10px!important;letter-spacing:1px!important;font-size:10px!important;}
.lang-toggle:hover{border-color:var(--orange)!important;color:var(--orange)!important;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* ── HOME ── */
.home-wrap{
  min-height: calc(100vh - 56px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 36px 20px 44px;
}
.home-logo-area{text-align:center;margin-bottom:40px;}
.home-site-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,5vw,52px);font-weight:900;font-style:italic;
  color:var(--dark); letter-spacing:-0.5px;
}
.home-tagline{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);margin-top:10px;
}

.cats-row{
  display:flex; gap:clamp(28px,7vw,100px);
  align-items:flex-start; justify-content:center;
  flex-wrap:wrap;
}

.cat-avatar-btn{
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  transition:transform 0.3s ease;
  padding:0;
}
.cat-avatar-btn:hover{transform:translateY(-6px);}

.avatar-ring{
  width:220px;height:220px;border-radius:50%;
  border:2px solid var(--border);
  overflow:hidden;
  transition:border-color 0.3s;
  position:relative;
}
.cat-avatar-btn:hover .avatar-ring{border-color:var(--gold);}

.avatar-ring img{
  width:100%;height:100%;object-fit:cover;
  object-position:center top;
  filter:sepia(8%) contrast(1.05);
  transition:transform 0.5s ease;
}
.cat-avatar-btn:hover .avatar-ring img{transform:scale(1.08);}

.avatar-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(44,34,24,0);
  transition:background 0.3s;
  display:flex;align-items:center;justify-content:center;
}
.cat-avatar-btn:hover .avatar-overlay{background:rgba(44,34,24,0.18);}
.avatar-overlay span{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--cream);opacity:0;transition:opacity 0.3s;
}
.cat-avatar-btn:hover .avatar-overlay span{opacity:1;}

.avatar-name{
  font-family:'Playfair Display','Noto Serif SC',serif;
  font-size:26px;font-weight:700;color:var(--dark);
  letter-spacing:-0.3px;
}
.avatar-birthday{
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--warm);margin-top:-6px;
}

/* ── CAT PROFILE PAGE ── */
.page-header{background:var(--dark);padding:50px 20px 44px;text-align:center;}
.page-header-eyebrow{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.page-header-title{font-family:'Playfair Display','Noto Serif SC',serif;font-size:clamp(30px,5vw,52px);font-weight:700;color:var(--cream);}
.page-header-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);margin-top:10px;}

.profile-tabs{
  display:flex;justify-content:center;gap:0;
  border-bottom:0.5px solid var(--border);
  background:var(--light);
}
.tab-btn{
  background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;font-family:'Lato',sans-serif;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;color:var(--warm);
  padding:16px 32px;margin-bottom:-0.5px;transition:all 0.2s;
}
.tab-btn.active{color:var(--dark);border-bottom-color:var(--orange);}
.tab-btn:hover{color:var(--dark);}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* GALLERY inside profile */
.gallery-section{max-width:1000px;margin:0 auto;padding:36px 28px 60px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.gallery-item{overflow:hidden;aspect-ratio:3/4;cursor:pointer;position:relative;border:0.5px solid var(--border);}
.gallery-item img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:sepia(8%) contrast(1.04);transition:transform 0.6s ease;display:block;}
.gallery-item:hover img{transform:scale(1.07);}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(44,34,24,0.82));padding:28px 14px 14px;color:var(--cream);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:0;transition:opacity 0.3s;}
.gallery-item:hover .gallery-caption{opacity:1;}
.upload-zone{border:1px dashed var(--border);padding:36px;text-align:center;margin-top:24px;cursor:pointer;transition:border-color 0.2s;}
.upload-zone:hover{border-color:var(--gold);}
.upload-zone p{font-size:13px;color:var(--warm);letter-spacing:1px;margin-bottom:6px;}
.upload-zone span{font-size:10px;color:var(--border);letter-spacing:2px;text-transform:uppercase;}
.upload-zone input{display:none;}

/* DIARY inside profile */
.diary-section{max-width:700px;margin:0 auto;padding:44px 28px 60px;}
.diary-new-btn{display:flex;align-items:center;gap:10px;background:var(--dark);color:var(--cream);border:none;cursor:pointer;padding:13px 24px;font-family:'Lato',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;transition:background 0.2s;}
.diary-new-btn:hover{background:#3d2f22;}
.diary-form{display:none;background:var(--light);border:0.5px solid var(--border);padding:28px;margin-bottom:36px;}
.diary-form.open{display:block;}
.diary-form label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);margin-bottom:6px;margin-top:14px;}
.diary-form input,.diary-form textarea{width:100%;border:0.5px solid var(--border);background:var(--cream);padding:10px 14px;font-family:'Lato',sans-serif;font-size:14px;color:var(--dark);outline:none;}
.diary-form textarea{resize:vertical;min-height:90px;}
.diary-form-actions{display:flex;gap:10px;margin-top:18px;}
.btn-save{background:var(--dark);color:var(--cream);border:none;padding:10px 22px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Lato',sans-serif;}
.btn-cancel{background:none;color:var(--warm);border:0.5px solid var(--border);padding:10px 18px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Lato',sans-serif;}
.diary-list-container { margin-top: 20px; }
.diary-entry{border-left:2px solid var(--border);padding-left:26px;margin-bottom:44px;position:relative;}
.diary-entry::before{content:'';position:absolute;left:-5px;top:6px;width:8px;height:8px;background:var(--gold);border-radius:50%;}
.diary-date{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.diary-title{font-family:'Playfair Display','Noto Serif SC',serif;font-size:21px;font-weight:700;color:var(--dark);margin-bottom:10px;line-height:1.3;}
.diary-body{font-size:14.5px;line-height:1.9;color:var(--text);}
.diary-body-en{font-size:13px;line-height:1.8;color:var(--warm);margin-top:8px;font-style:italic;}
.diary-img { max-width: 100%; border: 0.5px solid var(--border); margin-top: 15px; filter: sepia(8%) contrast(1.04); }
.empty-state{text-align:center;padding:60px 0;color:var(--warm);font-size:13px;letter-spacing:1px;}

/* GALLERY PAGE (combined) */
.gallery-filter{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.filter-btn{background:none;border:0.5px solid var(--border);cursor:pointer;font-family:'Lato',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);padding:7px 18px;transition:all 0.2s;}
.filter-btn:hover,.filter-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}

/* VIDEO PAGE */
.video-section{max-width:900px;margin:0 auto;padding:44px 28px 70px;}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px;}
.video-card{border:0.5px solid var(--border);background:var(--light);overflow:hidden;}
.video-thumb{position:relative;aspect-ratio:16/9;background:var(--dark);overflow:hidden;}
.video-thumb video{width:100%;height:100%;object-fit:cover;display:block;}
.video-meta{padding:16px 20px;}
.video-cat-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.video-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--dark);}
.video-upload-card{border:1px dashed var(--border);background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;cursor:pointer;padding:30px;transition:border-color 0.2s;}
.video-upload-card:hover{border-color:var(--gold);}
.video-upload-card p{font-size:13px;color:var(--warm);letter-spacing:1px;margin-top:12px;margin-bottom:6px;}
.video-upload-card span{font-size:10px;color:var(--border);letter-spacing:2px;text-transform:uppercase;}
.video-upload-card input{display:none;}
.play-icon{width:44px;height:44px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.play-icon::after{content:'';border-left:13px solid var(--gold);border-top:8px solid transparent;border-bottom:8px solid transparent;margin-left:4px;}

/* FOOTER */
footer{background:var(--dark);text-align:center;padding:36px 20px;border-top:1px solid rgba(255,255,255,0.05);}
.footer-logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:900;font-style:italic;color:var(--orange);margin-bottom:8px;}
.footer-text{font-size:11px;color:var(--warm);letter-spacing:2px;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(20,14,10,0.95);z-index:999;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:82vh;object-fit:contain;border:0.5px solid var(--border);}
.lightbox-close{position:fixed;top:20px;right:24px;background:none;border:none;color:var(--warm);font-size:28px;cursor:pointer;line-height:1;}
.lightbox-caption{color:var(--warm);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:14px;}

/* BACK BTN */
.back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Lato',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);padding:20px 28px 0;transition:color 0.2s;}
.back-btn:hover{color:var(--dark);}
.back-btn::before{content:'←';font-size:14px;}

/* owner-only elements hidden by default */
.owner-only{display:none!important;}
body.is-owner .owner-only{display:block!important;}
body.is-owner label.owner-only{display:flex!important;}

/* lock button in nav */
.lock-btn{background:none;border:0.5px solid rgba(255,255,255,0.15)!important;color:var(--warm)!important;padding:4px 10px!important;letter-spacing:1px!important;font-size:13px!important;cursor:pointer;transition:border-color 0.2s;}
.lock-btn:hover{border-color:var(--gold)!important;color:var(--gold)!important;}

/* password modal */
.pw-modal{display:none;position:fixed;inset:0;background:rgba(20,14,10,0.92);z-index:9999;align-items:center;justify-content:center;}
.pw-modal.open{display:flex;}
.pw-box{background:var(--cream);padding:40px 36px;max-width:340px;width:90%;text-align:center;}
.pw-box h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--dark);margin-bottom:8px;}
.pw-box p{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);margin-bottom:24px;}
.pw-box input{width:100%;border:0.5px solid var(--border);background:var(--light);padding:11px 14px;font-family:'Lato',sans-serif;font-size:15px;color:var(--dark);outline:none;text-align:center;letter-spacing:3px;margin-bottom:14px;}
.pw-box button{width:100%;background:var(--dark);color:var(--cream);border:none;padding:12px;cursor:pointer;font-family:'Lato',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;}
.pw-box button:hover{background:#3d2f22;}
.pw-error{font-size:11px;color:#c0392b;margin-top:8px;display:none;}

@media(max-width:600px){
  nav{padding:0 16px;}
  .cats-row{gap:28px;}
  .avatar-ring{width:150px;height:150px;}
  .avatar-name{font-size:20px;}
  .video-grid{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="showPage('home')">jojo's cats</div>
  <div class="nav-links">
    <button onclick="showPage('home')" id="nav-home" class="active" data-zh="首页" data-en="Home">首页</button>
    <button onclick="showPage('gallery')" id="nav-gallery" data-zh="相册" data-en="Gallery">相册</button>
    <button onclick="showPage('videos')" id="nav-videos" data-zh="视频" data-en="Videos">视频</button>
    <button class="lang-toggle" onclick="toggleLang()" id="lang-btn">EN</button>
    <button class="lock-btn" onclick="openPwModal()" id="lock-btn" title="Owner login">🔒</button>
  </div>
</nav>

<div class="page active" id="page-home">
  <div class="home-wrap">
    <div class="home-logo-area">
      <div class="home-site-name">jojo's cats</div>
      <div class="home-tagline" data-zh="点击认识他们" data-en="Click to meet them">点击认识他们</div>
    </div>
    <div class="cats-row">
      <button class="cat-avatar-btn" onclick="showCatPage('talkie')">
        <div class="avatar-ring">
          <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&q=80&w=500" alt="Talkie">
          <div class="avatar-overlay"><span data-zh="进入档案" data-en="VIEW PROFILE">进入档案</span></div>
        </div>
        <div class="avatar-name">Talkie</div>
        <div class="avatar-birthday">2023.04.12</div>
      </button>

      <button class="cat-avatar-btn" onclick="showCatPage('mogu')">
        <div class="avatar-ring">
          <img src="https://images.unsplash.com/photo-1573865526739-10659fec78a5?auto=format&fit=crop&q=80&w=500" alt="Mogu">
          <div class="avatar-overlay"><span data-zh="进入档案" data-en="VIEW PROFILE">进入档案</span></div>
        </div>
        <div class="avatar-name" data-zh="蘑菇" data-en="Mogu">蘑菇</div>
        <div class="avatar-birthday">2024.02.18</div>
      </button>
    </div>
  </div>
</div>

<div class="page" id="page-cat-profile">
  <button class="back-btn" onclick="showPage('home')" data-zh="返回首页" data-en="BACK TO HOME">返回首页</button>
  
  <div class="page-header">
    <div class="page-header-eyebrow" data-zh="猫咪档案" data-en="CAT PROFILE">猫咪档案</div>
    <div class="page-header-title" id="profile-cat-name">Cat Name</div>
    <div class="page-header-sub" id="profile-cat-bday">BIRTHDAY</div>
  </div>

  <div class="profile-tabs">
    <button class="tab-btn active" onclick="switchTab('diary')" id="tab-diary-btn" data-zh="猫咪日记" data-en="DIARY">猫咪日记</button>
    <button class="tab-btn" onclick="switchTab('gallery')" id="tab-gallery-btn" data-zh="生活相册" data-en="GALLERY">生活相册</button>
  </div>

  <div id="cat-diary-tab" class="tab-content active">
    <div class="diary-section">
      <button class="diary-new-btn owner-only" onclick="toggleDiaryForm()" data-zh="+ 新增日记" data-en="+ NEW ENTRY">+ 新增日记</button>
      
      <div class="diary-form" id="diaryForm">
        <label data-zh="日期" data-en="DATE">日期</label>
        <input type="text" id="diary-input-date" placeholder="e.g. 2026.06.15">
        
        <label data-zh="标题" data-en="TITLE">标题</label>
        <input type="text" id="diary-input-title" placeholder="日记标题...">
        
        <label data-zh="日记内容 (中文)" data-en="CONTENT (CHINESE)">日记内容 (中文)</label>
        <textarea id="diary-input-body" placeholder="今天猫咪做了什么..."></textarea>
        
        <label data-zh="日记内容 (英文)" data-en="CONTENT (ENGLISH)">日记内容 (英文)</label>
        <textarea id="diary-input-body-en" placeholder="English translation..."></textarea>
        
        <label data-zh="配图照片 (可选)" data-en="PHOTO (OPTIONAL)">配图照片 (可选)</label>
        <input type="file" id="diary-input-file" accept="image/*" style="display:block; margin-bottom:10px;">

        <div class="diary-form-actions">
          <button class="btn-save" onclick="saveDiaryEntry()" id="diary-save-btn" data-zh="保存发布" data-en="SAVE ENTRY">保存发布</button>
          <button class="btn-cancel" onclick="toggleDiaryForm()" data-zh="取消" data-en="CANCEL">取消</button>
        </div>
      </div>

      <div class="diary-list-container" id="diary-entries-list">
        </div>
    </div>
  </div>

  <div id="cat-gallery-tab" class="tab-content">
    <div class="gallery-section">
      <div class="upload-zone owner-only" onclick="document.getElementById('gallery-file-input').click()">
        <p data-zh="点击上传新照片" data-en="Click to upload new photo">点击上传新照片</p>
        <span data-zh="支持 JPG, PNG 格式" data-en="SUPPORT JPG, PNG">支持 JPG, PNG 格式</span>
        <input type="file" id="gallery-file-input" accept="image/*" onchange="uploadGalleryImage(this)">
      </div>
      <div class="gallery-grid" id="cat-gallery-grid" style="margin-top:24px;">
        </div>
    </div>
  </div>
</div>

<div class="page" id="page-gallery">
  <div class="gallery-section">
    <div class="gallery-filter">
      <button class="filter-btn active" onclick="filterGallery('all')" data-zh="全部" data-en="ALL">全部</button>
      <button class="filter-btn" onclick="filterGallery('talkie')">Talkie</button>
      <button class="filter-btn" onclick="filterGallery('mogu')" data-zh="蘑菇" data-en="Mogu">蘑菇</button>
    </div>
    <div class="gallery-grid" id="global-gallery-grid">
      </div>
  </div>
</div>

<div class="page" id="page-videos">
  <div class="video-section">
    <div class="video-grid">
      <div class="video-upload-card owner-only">
        <div class="play-icon"></div>
        <p data-zh="上传猫咪视频" data-en="Upload cat video">上传猫咪视频</p>
        <span data-zh="点击选择文件" data-en="CLICK TO CHOOSE">点击选择文件</span>
      </div>
      <div class="video-card">
        <div class="video-thumb">
          <video src="" controls></video>
        </div>
        <div class="video-meta">
          <div class="video-cat-tag">Talkie</div>
          <div class="video-title">午后的小憩时刻</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">&times;</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<div class="pw-modal" id="pwModal">
  <div class="pw-box">
    <h2 data-zh="主人登录" data-en="OWNER LOGIN">主人登录</h2>
    <p data-zh="请输入管理密码" data-en="ENTER ACCESS PASSWORD">请输入管理密码</p>
    <input type="password" id="pw-input" placeholder="••••">
    <button onclick="checkPassword()" data-zh="验证" data-en="VERIFY">验证</button>
    <div class="pw-error" id="pw-error" data-zh="密码错误" data-en="INVALID PASSWORD">密码错误</div>
    <button onclick="closePwModal()" class="btn-cancel" style="margin-top:10px; width:100%; border:none;" data-zh="取消" data-en="CANCEL">取消</button>
  </div>
</div>

<footer>
  <div class="footer-logo">jojo's cats</div>
  <div class="footer-text">© 2026 JOJO'S CATS. ALL RIGHTS RESERVED.</div>
</footer>

<script>
// ==========================================
// 🔐 请在下方填入你的 Supabase 真实凭证

// 基础页面切换
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
  
  document.getElementById(`page-${pageId}`).classList.add('active');
  const navBtn = document.getElementById(`nav-${pageId}`);
  if(navBtn) navBtn.classList.add('active');
  
  if (pageId === 'gallery') {
    fetchGlobalGallery();
  }
}

// 进入特定猫咪主页
function showCatPage(catId) {
  currentCat = catId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-cat-profile').classList.add('active');
  
  if(catId === 'talkie') {
    document.getElementById('profile-cat-name').innerText = 'Talkie';
    document.getElementById('profile-cat-bday').innerText = 'BIRTHDAY: 2023.04.12';
  } else {
    document.getElementById('profile-cat-name').innerText = currentLang === 'zh' ? '蘑菇' : 'Mogu';
    document.getElementById('profile-cat-bday').innerText = 'BIRTHDAY: 2024.02.18';
  }
  
  switchTab('diary');
}

// 标签切换
function switchTab(tabType) {
  document.getElementById('tab-diary-btn').classList.toggle('active', tabType === 'diary');
  document.getElementById('tab-gallery-btn').classList.toggle('active', tabType === 'gallery');
  document.getElementById('cat-diary-tab').classList.toggle('active', tabType === 'diary');
  document.getElementById('cat-gallery-tab').classList.toggle('active', tabType === 'gallery');
  
  if(tabType === 'diary') {
    fetchDiaries();
  } else {
    fetchCatGallery();
  }
}

// 展开/收起日记表单
function toggleDiaryForm() {
  const form = document.getElementById('diaryForm');
  form.classList.toggle('open');
  if(form.classList.contains('open')) {
    const today = new Date();
    document.getElementById('diary-input-date').value = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  }
}

// 语言切换
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  document.getElementById('lang-btn').innerText = currentLang === 'zh' ? 'EN' : '中文';
  
  document.querySelectorAll('[data-zh]').forEach(el => {
    el.innerText = currentLang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
  });
  
  if(currentCat) showCatPage(currentCat);
}

// 放大图处理
function openLightbox(src, caption) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').innerText = caption || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ☁️ SUPABASE 后端云业务数据逻辑
// ==========================================

// 1. 获取当前猫咪的日记
async function fetchDiaries() {
  const listContainer = document.getElementById('diary-entries-list');
  listContainer.innerHTML = `<div class="empty-state">Loading...</div>`;
  
  const { data, error } = await supabase
    .from('cat_diaries')
    .select('*')
    .eq('cat_id', currentCat)
    .order('created_at', { ascending: false });
    
  if (error || !data || data.length === 0) {
    listContainer.innerHTML = `<div class="empty-state" data-zh="暂无日记记录" data-en="No diary entries yet.">暂无日记记录</div>`;
    return;
  }
  
  listContainer.innerHTML = data.map(item => `
    <div class="diary-entry">
      <div class="diary-date">${escapeHtml(item.created_at)}</div>
      <div class="diary-title">${escapeHtml(item.title)}</div>
      <div class="diary-body">${escapeHtml(item.body)}</div>
      ${item.body_en ? `<div class="diary-body-en">${escapeHtml(item.body_en)}</div>` : ''}
      ${item.image_url ? `<img src="${item.image_url}" class="diary-img" onclick="openLightbox('${item.image_url}')">` : ''}
    </div>
  `).join('');
}

// 2. 保存发布新日记
async function saveDiaryEntry() {
  const saveBtn = document.getElementById('diary-save-btn');
  const dateStr = document.getElementById('diary-input-date').value.trim();
  const title = document.getElementById('diary-input-title').value.trim();
  const body = document.getElementById('diary-input-body').value.trim();
  const bodyEn = document.getElementById('diary-input-body-en').value.trim();
  const fileInput = document.getElementById('diary-input-file');
  
  if(!title || !body) {
    alert('请填写标题和中文内容！');
    return;
  }
  
  saveBtn.disabled = true;
  saveBtn.innerText = 'Uploading...';
  
  let imageUrl = null;
  
  try {
    if(fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const fileExt = file.name.split('.').pop();
      const filePath = `diary/${Date.now()}.${fileExt}`;
      
      const { error: uploadError } = await supabase.storage.from('cats').upload(filePath, file);
      if(uploadError) throw uploadError;
      
      const { data: urlData } = supabase.storage.from('cats').getPublicUrl(filePath);
      imageUrl = urlData.publicUrl;
    }
    
    const { error: insertError } = await supabase.from('cat_diaries').insert([{
      cat_id: currentCat,
      created_at: dateStr || undefined,
      title: title,
      body: body,
      body_en: bodyEn,
      image_url: imageUrl
    }]);
    
    if(insertError) throw insertError;
    
    // 清空重置
    document.getElementById('diary-input-title').value = '';
    document.getElementById('diary-input-body').value = '';
    document.getElementById('diary-input-body-en').value = '';
    fileInput.value = '';
    toggleDiaryForm();
    fetchDiaries();
    
  } catch(e) {
    alert('发布失败: ' + e.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerText = currentLang === 'zh' ? '保存发布' : 'SAVE ENTRY';
  }
}

// 3. 上传纯相册照片
async function uploadGalleryImage(input) {
  if(input.files.length === 0) return;
  const file = input.files[0];
  const fileExt = file.name.split('.').pop();
  const filePath = `gallery/${currentCat}/${Date.now()}.${fileExt}`;
  
  try {
    const { error: uploadError } = await supabase.storage.from('cats').upload(filePath, file);
    if(uploadError) throw uploadError;
    
    const { data: urlData } = supabase.storage.from('cats').getPublicUrl(filePath);
    
    // 纯相册照片在数据库中也占一条，但 body 为空区分
    const { error: insertError } = await supabase.from('cat_diaries').insert([{
      cat_id: currentCat,
      title: 'Gallery Image',
      body: '',
      image_url: urlData.publicUrl
    }]);
    
    if(insertError) throw insertError;
    fetchCatGallery();
    
  } catch(e) {
    alert('图片上传失败: ' + e.message);
  } finally {
    input.value = '';
  }
}

// 4. 获取当前猫咪的独立相册
async function fetchCatGallery() {
  const grid = document.getElementById('cat-gallery-grid');
  grid.innerHTML = '';
  
  const { data, error } = await supabase
    .from('cat_diaries')
    .select('image_url, title')
    .eq('cat_id', currentCat)
    .not('image_url', 'is', null);
    
  if(error || !data || data.length === 0) return;
  
  grid.innerHTML = data.map(item => `
    <div class="gallery-item" onclick="openLightbox('${item.image_url}', '${escapeHtml(item.title)}')">
      <img src="${item.image_url}" alt="Cat">
    </div>
  `).join('');
}

// 5. 获取全局大相册（整合页）
async function fetchGlobalGallery() {
  const grid = document.getElementById('global-gallery-grid');
  grid.innerHTML = '<div class="empty-state">Loading...</div>';
  
  const { data, error } = await supabase
    .from('cat_diaries')
    .select('image_url, title, cat_id')
    .not('image_url', 'is', null)
    .order('created_at', { ascending: false });
    
  if(error || !data || data.length === 0) {
    grid.innerHTML = `<div class="empty-state">暂无照片</div>`;
    return;
  }
  
  window.globalGalleryData = data; // 缓存供筛选
  filterGallery('all');
}

// 6. 全局相册分类筛选
function filterGallery(filter) {
  const grid = document.getElementById('global-gallery-grid');
  const data = window.globalGalleryData || [];
  
  document.querySelectorAll('.gallery-filter .filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.innerText.toLowerCase().includes(filter) || (filter === 'all' && btn.getAttribute('data-zh') === '全部'));
  });
  
  const filtered = filter === 'all' ? data : data.filter(item => item.cat_id === filter);
  
  if(filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">没有找到照片</div>`;
    return;
  }
  
  grid.innerHTML = filtered.map(item => `
    <div class="gallery-item" onclick="openLightbox('${item.image_url}', '${escapeHtml(item.title)}')">
      <img src="${item.image_url}" alt="Cat">
      <div class="gallery-caption">${item.cat_id}</div>
    </div>
  `).join('');
}

// 简单的 HTML 转义防注入
function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
